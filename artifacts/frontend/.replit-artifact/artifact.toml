kind = "web"
previewPath = "/"
title = "Developer Painkiller"
version = "1.0.0"
id = "artifacts/developer-painkiller"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20429

[services.development]
run = "pnpm --filter @workspace/developer-painkiller run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/developer-painkiller", "run", "build" ]
publicDir = "artifacts/developer-painkiller/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20429"
BASE_PATH = "/"
