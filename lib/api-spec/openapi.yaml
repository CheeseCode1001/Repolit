openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: repos
    description: Repository analysis operations
  - name: analyses
    description: Analysis results operations
  - name: profile
    description: User profile operations
  - name: sharing
    description: Repo sharing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /repos:
    get:
      operationId: listRepos
      tags: [repos]
      summary: List recently analyzed repositories
      responses:
        "200":
          description: List of repos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Repo"
    post:
      operationId: createRepo
      tags: [repos]
      summary: Submit a repository URL for analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepoBody"
      responses:
        "201":
          description: Repo created and analysis queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repo"

  /repos/upload:
    post:
      operationId: uploadRepo
      tags: [repos]
      summary: Upload a zip or folder for analysis
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Repo created and analysis queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repo"

  /repos/{id}:
    get:
      operationId: getRepo
      tags: [repos]
      summary: Get a repository by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Repo details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repo"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteRepo
      tags: [repos]
      summary: Delete a repository record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /repos/{id}/analyze:
    post:
      operationId: analyzeRepo
      tags: [repos]
      summary: Trigger AI analysis for a repository (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of analysis progress and results
          content:
            text/event-stream: {}
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /repos/{id}/analysis:
    get:
      operationId: getRepoAnalysis
      tags: [analyses]
      summary: Get the latest analysis results for a repository
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /repos/{id}/chat:
    post:
      operationId: chatWithRepo
      tags: [analyses]
      summary: Ask a contextual question about a repository
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatBody"
      responses:
        "200":
          description: AI answer to the question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /repos/{id}/share:
    post:
      operationId: shareRepo
      tags: [sharing]
      summary: Generate or retrieve a public share token for a repo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareTokenResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /shared/{token}:
    get:
      operationId: getSharedAnalysis
      tags: [sharing]
      summary: Get a publicly shared repo analysis by token (no auth required)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared repo and analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedAnalysisResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stats:
    get:
      operationId: getStats
      tags: [repos]
      summary: Get aggregate stats (total repos, analyses, languages breakdown)
      responses:
        "200":
          description: Stats object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get the current user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Repo:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        name:
          type: string
        owner:
          type: string
        description:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        stars:
          type: integer
          nullable: true
        status:
          type: string
          description: "pending | analyzing | done | error"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - url
        - name
        - owner
        - status
        - createdAt
        - updatedAt

    CreateRepoBody:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    Analysis:
      type: object
      properties:
        id:
          type: integer
        repoId:
          type: integer
        summary:
          type: string
          nullable: true
        architecture:
          type: string
          nullable: true
          description: Mermaid diagram syntax
        onboarding:
          type: string
          nullable: true
        security:
          type: string
          nullable: true
        startHere:
          type: string
          nullable: true
          description: JSON array of start-here file recommendations
        commitHistory:
          type: string
          nullable: true
          description: JSON array of recent commits
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - repoId
        - createdAt

    ChatBody:
      type: object
      properties:
        question:
          type: string
      required:
        - question

    ChatResponse:
      type: object
      properties:
        answer:
          type: string
      required:
        - answer

    Stats:
      type: object
      properties:
        totalRepos:
          type: integer
        totalAnalyses:
          type: integer
        languageCounts:
          type: object
          additionalProperties:
            type: integer
        recentRepos:
          type: array
          items:
            $ref: "#/components/schemas/Repo"
        points:
          type: integer
      required:
        - totalRepos
        - totalAnalyses
        - languageCounts
        - recentRepos
        - points

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ShareTokenResponse:
      type: object
      properties:
        shareToken:
          type: string
      required:
        - shareToken

    SharedAnalysisResponse:
      type: object
      properties:
        repo:
          $ref: "#/components/schemas/Repo"
        analysis:
          $ref: "#/components/schemas/Analysis"
          nullable: true
      required:
        - repo

    UserProfile:
      type: object
      properties:
        userId:
          type: string
        isAnon:
          type: boolean
        displayName:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        avatarConfig:
          type: string
          nullable: true
        points:
          type: integer
        extraScansUnlocked:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - userId
        - isAnon
        - points
        - extraScansUnlocked
        - createdAt
        - updatedAt

    UpdateProfileBody:
      type: object
      properties:
        displayName:
          type: string
        username:
          type: string
        bio:
          type: string
        avatarConfig:
          type: string
